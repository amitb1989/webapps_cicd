version: 0.0
os: linux

files:
  - source: app/
    destination: /home/webapp
    overwrite: true

permissions:
  - object: /home/webapp
    owner: webapp
    group: webapp
    mode: "755"
    type:
      - file
      - directory

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 120
      runas: root
  
  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 600
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 180
      runas: root

  ValidateService:
    - location: scripts/validate.sh
      timeout: 180
      runas: root
